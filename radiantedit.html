<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiant Admin | NovaScript</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #ececec; font-family: 'Inter', sans-serif; }
        .glass-card { background: #0f0f11; border: 1px solid #1f1f22; }
        .input-clean { background-color: #050505; border: 1px solid #27272a; color: white; transition: 0.2s; }
        .input-clean:focus { border-color: #93c5fd; outline: none; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-10">
            <h1 class="text-2xl font-black text-white tracking-tight uppercase">Radiant <span class="text-blue-400">Editor</span></h1>
            <p class="text-zinc-500 text-sm">Edit library Radiant shared script</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass-card p-6 rounded-2xl h-fit">
                <h2 class="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-6">New Script</h2>
                <form id="add-form" class="space-y-4">
                    <input type="text" id="title" required placeholder="Script Title" class="input-clean w-full px-4 py-2 rounded-lg text-sm">
                    <textarea id="desc" required placeholder="Description" rows="2" class="input-clean w-full px-4 py-2 rounded-lg text-sm"></textarea>
                    <textarea id="loader" required placeholder="Loader code..." rows="4" class="input-clean w-full px-4 py-2 rounded-lg text-xs font-mono"></textarea>
                    <button type="submit" id="btn-add" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-lg text-xs uppercase transition-all">
                        Publish Script
                    </button>
                </form>
            </div>

            <div class="glass-card p-6 rounded-2xl">
                <h2 class="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-6">Active Collection</h2>
                <div id="list" class="space-y-3 text-sm">
                    <p class="text-zinc-600 italic">Syncing...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = sessionStorage.getItem('radiant_token');
        
        // Cek jika tidak ada token, paksa login dulu di /radiant
        if (!token) {
            alert('Akses Ditolak! Anda harus login di halaman /radiant terlebih dahulu.');
            window.location.href = '/radiant';
        }

        async function loadAdminScripts() {
            try {
                const res = await fetch('/.netlify/functions/manage-radiant?admin=true', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if(!res.ok) throw new Error("Akses Ditolak");
                
                const data = await res.json();
                const list = document.getElementById('list');
                list.innerHTML = '';

                if (data.scripts.length === 0) {
                    list.innerHTML = '<p class="text-zinc-600 text-xs py-4">No scripts available.</p>';
                    return;
                }

                data.scripts.forEach(s => {
                    list.innerHTML += `
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 bg-[#050505] border border-zinc-800 rounded-xl hover:border-zinc-700 transition-all gap-4">
                            <div class="flex flex-col">
                                <span class="font-bold text-white leading-tight">${s.title}</span>
                                <span class="text-[9px] font-black uppercase mt-1 ${s.is_active ? 'text-blue-400' : 'text-zinc-600'}">${s.is_active ? 'Visible' : 'Hidden'}</span>
                            </div>
                            <div class="flex gap-2 w-full sm:w-auto">
                                <button onclick="toggleVisibility(${s.id}, ${!s.is_active})" class="flex-1 sm:flex-none text-[10px] font-bold uppercase bg-zinc-800 px-3 py-1.5 rounded-lg hover:bg-zinc-700 transition-colors">
                                    ${s.is_active ? 'Hide' : 'Show'}
                                </button>
                                <button onclick="deleteScript(${s.id})" class="flex-1 sm:flex-none text-[10px] font-bold uppercase bg-red-950/30 text-red-500 border border-red-900/30 px-3 py-1.5 rounded-lg hover:bg-red-900/50 hover:text-red-400 transition-colors">
                                    Delete
                                </button>
                            </div>
                        </div>`;
                });
            } catch(e) {
                document.getElementById('list').innerHTML = '<p class="text-red-500 font-bold text-xs py-4">Sesi kadaluarsa, silahkan relogin di /radiant.</p>';
            }
        }

        // Form Submit
        document.getElementById('add-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-add');
            btn.disabled = true; btn.innerText = 'PUBLISHING...';

            const payload = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                loader_script: document.getElementById('loader').value
            };

            await fetch('/.netlify/functions/manage-radiant', {
                method: 'POST', 
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token 
                },
                body: JSON.stringify(payload)
            });
            
            this.reset();
            btn.disabled = false; btn.innerText = 'PUBLISH SCRIPT';
            loadAdminScripts();
        });

        async function toggleVisibility(id, newStatus) {
            await fetch('/.netlify/functions/manage-radiant', {
                method: 'PATCH', 
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token 
                },
                body: JSON.stringify({ id: id, is_active: newStatus })
            });
            loadAdminScripts();
        }

        async function deleteScript(id) {
            if (!confirm("Yakin ingin menghapus script ini secara permanen?")) return;
            
            await fetch('/.netlify/functions/manage-radiant', {
                method: 'DELETE', 
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token 
                },
                body: JSON.stringify({ id: id })
            });
            loadAdminScripts();
        }

        loadAdminScripts();
    </script>
</body>
</html>
