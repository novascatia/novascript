<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiant Admin | NovaScript</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #ececec; font-family: 'Inter', sans-serif; }
        .glass-card { background: #0f0f11; border: 1px solid #1f1f22; }
        .input-clean { background-color: #050505; border: 1px solid #27272a; color: white; transition: 0.2s; }
        .input-clean:focus { border-color: #93c5fd; outline: none; box-shadow: 0 0 0 2px rgba(147, 197, 253, 0.05); }
    </style>
</head>
<body class="p-8">

    <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <header class="lg:col-span-12 mb-4">
            <h1 class="text-3xl font-black text-white tracking-tighter uppercase italic">Nova <span class="text-blue-400">Radiant Admin</span></h1>
            <p class="text-zinc-500 text-sm">Kelola script gratis khusus member tier Radiant.</p>
        </header>

        <div class="lg:col-span-5">
            <div class="glass-card p-8 rounded-3xl sticky top-8">
                <h2 class="text-sm font-black text-blue-300 uppercase tracking-widest mb-6 italic">Publish New Script</h2>
                <form id="add-form" onsubmit="addScript(event)" class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-500 uppercase mb-2 tracking-widest">Script Title</label>
                        <input type="text" id="title" required placeholder="e.g. Auto Farm Deluxe" class="input-clean w-full px-5 py-3 rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-500 uppercase mb-2 tracking-widest">Description</label>
                        <textarea id="desc" required placeholder="Brief information..." rows="2" class="input-clean w-full px-5 py-3 rounded-xl text-sm"></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-500 uppercase mb-2 tracking-widest">Loader (Lua Code)</label>
                        <textarea id="loader" required placeholder="loadstring(game:HttpGet(...))()" rows="4" class="input-clean w-full px-5 py-4 rounded-xl text-xs font-mono text-blue-300"></textarea>
                    </div>
                    <button type="submit" id="btn-add" class="w-full bg-blue-400 hover:bg-blue-300 text-black font-black py-4 rounded-xl transition-all shadow-lg shadow-blue-400/10 uppercase tracking-widest text-xs">
                        Publish to Radiant Hub
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-7">
            <div class="glass-card p-8 rounded-3xl">
                <h2 class="text-sm font-black text-white uppercase tracking-widest mb-6 italic">Active Collection</h2>
                <div id="list" class="space-y-4">
                    <p class="text-center py-10 text-zinc-600 italic">Syncing radiant database...</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        async function loadAdminScripts() {
            const res = await fetch('/.netlify/functions/manage-radiant?admin=true');
            const data = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = '';

            if(data.scripts.length === 0) {
                list.innerHTML = '<div class="py-10 text-center text-zinc-700 text-xs uppercase tracking-widest">No scripts published yet</div>';
                return;
            }

            data.scripts.forEach(s => {
                const statusColor = s.is_active ? 'text-blue-400 border-blue-400/20 bg-blue-400/5' : 'text-zinc-600 border-zinc-800 bg-zinc-900/30';
                const statusText = s.is_active ? 'Visible' : 'Hidden';

                list.innerHTML += `
                    <div class="flex justify-between items-center bg-[#050505] border border-zinc-800/50 p-6 rounded-2xl group hover:border-zinc-700 transition-colors">
                        <div class="flex-1">
                            <h3 class="font-bold text-white mb-1 group-hover:text-blue-300 transition-colors">${s.title}</h3>
                            <span class="px-2.5 py-0.5 rounded-full border text-[9px] font-black uppercase tracking-tighter ${statusColor}">
                                ${statusText}
                            </span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="toggleVisibility(${s.id}, ${!s.is_active})" class="bg-zinc-900 border border-zinc-800 hover:border-blue-400/30 text-zinc-500 hover:text-white px-5 py-2.5 rounded-xl text-[10px] font-bold uppercase transition-all">
                                ${s.is_active ? 'Hide' : 'Show'}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        async function addScript(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-add');
            btn.disabled = true; btn.innerText = 'PUBLISHING...';

            const payload = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                loader_script: document.getElementById('loader').value
            };

            await fetch('/.netlify/functions/manage-radiant', {
                method: 'POST', body: JSON.stringify(payload)
            });
            
            document.getElementById('add-form').reset();
            btn.disabled = false; btn.innerText = 'PUBLISH TO RADIANT HUB';
            loadAdminScripts();
        }

        async function toggleVisibility(id, newStatus) {
            await fetch('/.netlify/functions/manage-radiant', {
                method: 'PATCH', body: JSON.stringify({ id: id, is_active: newStatus })
            });
            loadAdminScripts();
        }

        loadAdminScripts();
    </script>
</body>
</html>
