<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | NovaScript Global Stats</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #d4d4d8; }
        .stat-card { background: #18181b; border: 1px solid #27272a; transition: all 0.2s; }
        .stat-card:hover { border-color: #3b82f6; }
        .buyer-badge { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="min-h-screen p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-white mb-2">Market Overview</h1>
                <p class="text-gray-500 text-sm">Statistik penjualan global diurutkan berdasarkan performa terbaik.</p>
            </div>
            <div class="flex gap-4">
                <button onclick="resetFilters()" class="text-xs text-gray-500 hover:text-white transition-colors">Reset Excludes</button>
                <a href="/admin" class="text-xs text-blue-400 hover:underline">← Admin Hub</a>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div class="stat-card p-8 rounded-2xl">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Total Script Terjual (Active)</p>
                <h2 id="total-sold" class="text-5xl font-bold text-white">0</h2>
            </div>
            <div class="stat-card p-8 rounded-2xl">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Total Revenue (Active)</p>
                <h2 id="total-bgl" class="text-5xl font-bold text-yellow-500">0 <span class="text-sm font-normal">BGL</span></h2>
            </div>
        </div>

        <div class="stat-card rounded-2xl overflow-hidden">
            <div class="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/30">
                <h3 class="font-bold text-white">Sales Performance Ranking</h3>
                <button onclick="fetchStats()" class="text-[10px] bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold transition-all uppercase tracking-wider">Refresh Data</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-zinc-900/50 text-gray-400 uppercase text-[10px] font-bold">
                        <tr>
                            <th class="px-6 py-4">Rank & Script Info</th>
                            <th class="px-6 py-4 text-center">Price</th>
                            <th class="px-6 py-4 text-center">Sales Count</th>
                            <th class="px-6 py-4 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="stats-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let excludedIds = JSON.parse(localStorage.getItem('excluded_scripts') || '[]');

        async function fetchStats() {
            try {
                // Fetch data scripts dan data pembelian secara bersamaan
                const [resScripts, resPurchases] = await Promise.all([
                    fetch('/.netlify/functions/get-scripts'),
                    fetch('/.netlify/functions/get-purchases?all=true') 
                ]);

                const scriptResult = await resScripts.json();
                const purchaseResult = await resPurchases.json();

                if (scriptResult.success) {
                    // 1. URUTKAN (SCALING): Paling banyak terjual ke paling sedikit
                    const sortedScripts = scriptResult.scripts.sort((a, b) => 
                        (b.purchase_count || 0) - (a.purchase_count || 0)
                    );

                    renderTable(sortedScripts, purchaseResult.owned_scripts || []);
                }
            } catch (err) {
                console.error("Critical Error:", err);
            }
        }

        function renderTable(scripts, allPurchases) {
            const body = document.getElementById('stats-body');
            let totalSold = 0;
            let totalRevenue = 0;
            body.innerHTML = '';

            scripts.forEach((script, index) => {
                const isExcluded = excludedIds.includes(String(script.id));
                const sold = script.purchase_count || 0;
                const revenue = sold * (script.price || 0);

                if (!isExcluded) {
                    totalSold += sold;
                    totalRevenue += revenue;
                }

                // Filter pembeli yang memiliki script_id ini
                const buyers = allPurchases.filter(p => String(p.script_id) === String(script.id));

                const row = document.createElement('tr');
                row.className = `border-t border-zinc-800 transition-all ${isExcluded ? 'opacity-30 grayscale' : 'hover:bg-white/[0.02]'}`;
                
                row.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-4">
                            <span class="text-lg font-black text-zinc-700">#${index + 1}</span>
                            <div class="flex flex-col">
                                <span class="font-bold text-white">${script.title}</span>
                                <span class="text-[10px] text-zinc-500 font-mono italic">ID: ${script.id}</span>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-center font-mono text-zinc-400">${script.price || 0} BGL</td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="toggleExpand(${script.id})" class="bg-zinc-800 px-3 py-1 rounded-md text-xs font-bold hover:bg-zinc-700 transition-colors border border-zinc-700">
                            ${sold} Users ▾
                        </button>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="toggleExclude('${script.id}')" class="text-[10px] font-bold ${isExcluded ? 'text-green-500' : 'text-red-500'} uppercase hover:underline">
                            ${isExcluded ? 'Include' : 'Exclude'}
                        </button>
                    </td>
                `;

                // Sub-row untuk Expandable Buyer List
                const expandRow = document.createElement('tr');
                expandRow.id = `expand-${script.id}`;
                expandRow.className = "hidden bg-black/50";
                
                const buyerChips = buyers.length > 0 
                    ? buyers.map(b => `<div class="buyer-badge text-[11px] text-blue-400 px-3 py-2 rounded-lg flex items-center gap-2">
                        <span class="opacity-50">👤</span> ${b.user_username || 'Unknown'}
                      </div>`).join('')
                    : '<p class="text-xs text-zinc-600 italic py-2">Tidak ada data pembeli ditemukan di database.</p>';

                expandRow.innerHTML = `
                    <td colspan="4" class="px-10 py-6 border-l-2 border-blue-500">
                        <div class="mb-3 flex items-center gap-2">
                            <span class="h-px w-8 bg-blue-500/30"></span>
                            <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Authorized Buyers</span>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3">
                            ${buyerChips}
                        </div>
                    </td>
                `;

                body.appendChild(row);
                body.appendChild(expandRow);
            });

            // Update Header Stats
            document.getElementById('total-sold').innerText = totalSold.toLocaleString();
            document.getElementById('total-bgl').innerText = totalRevenue.toLocaleString();
        }

        function toggleExpand(id) {
            const el = document.getElementById(`expand-${id}`);
            el.classList.toggle('hidden');
        }

        function toggleExclude(id) {
            if (excludedIds.includes(String(id))) {
                excludedIds = excludedIds.filter(i => i !== String(id));
            } else {
                excludedIds.push(String(id));
            }
            localStorage.setItem('excluded_scripts', JSON.stringify(excludedIds));
            fetchStats();
        }

        function resetFilters() {
            excludedIds = [];
            localStorage.removeItem('excluded_scripts');
            fetchStats();
        }

        // Inisialisasi
        fetchStats();
    </script>
</body>
</html>
