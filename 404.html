<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | NovaScript</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ededed; overflow: hidden; }
        .glitch-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 800;
            background: linear-gradient(180deg, #fff 0%, #3f3f46 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .spotlight {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw; height: 60vh;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            pointer-events: none; z-index: -1;
        }
        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative px-6 text-center">
    <div class="noise"></div>
    <div class="spotlight"></div>

    <div class="relative z-20">
        <h1 class="glitch-text mb-2">404</h1>
        <h2 class="text-xl md:text-2xl font-bold text-gray-300 mb-4 tracking-tight">LOST IN THE VOID</h2>
        <p class="text-sm md:text-base text-gray-500 max-w-md mx-auto mb-8 leading-relaxed">
            Halaman yang kamu cari tidak ditemukan atau sudah dipindahkan.
        </p>
        
        <a href="/" class="inline-flex items-center justify-center px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg transition-all shadow-[0_0_15px_rgba(37,99,235,0.3)] hover:shadow-[0_0_25px_rgba(37,99,235,0.5)] hover:-translate-y-1">
            ← Kembali ke Library
        </a>
    </div>

    <div class="absolute bottom-8 text-xs text-zinc-600 font-mono z-20">
        SYSTEM.ERR_NOT_FOUND // NOVASCRIPT
    </div>
</body>
</html>
