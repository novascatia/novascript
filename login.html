<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaScript | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        .card-auth { background-color: #18181b; border: 1px solid #27272a; }
        .input-clean { background-color: #09090b; border: 1px solid #27272a; transition: border-color 0.2s; }
        .input-clean:focus { border-color: #3b82f6; outline: none; }
        #warning-modal { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="text-gray-300 min-h-screen flex items-center justify-center p-4">

    <div id="warning-modal" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-[#18181b] border border-zinc-800 w-full max-w-md rounded-2xl p-8 shadow-2xl text-center">
            <div class="w-16 h-16 bg-yellow-500/10 text-yellow-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-white mb-4">PENTING / IMPORTANT</h2>
            <div class="space-y-4 text-sm leading-relaxed text-gray-300">
                <p class="italic border-b border-zinc-800 pb-4 text-yellow-500/90">
                    "Gunakan kredensial khusus untuk <strong>novascript.site</strong>. Jangan gunakan password yang sama dengan akun game Anda."
                </p>
            </div>
            <button id="close-warning-btn" disabled class="w-full bg-zinc-700 text-gray-400 font-bold py-3 rounded-lg mt-8 transition-all cursor-not-allowed">
                Wait (<span id="warn-timer">5</span>s)
            </button>
        </div>
    </div>

    <div class="card-auth w-full max-w-md rounded-2xl p-8 shadow-xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white tracking-tight">NovaScript</h1>
            <p class="text-sm text-gray-500 mt-1">Portal Access</p>
        </div>

        <div id="alert-box" class="hidden mb-6 p-3 rounded-lg text-sm text-center font-medium"></div>

        <form id="auth-form" onsubmit="handleAuth(event)">
            <input type="hidden" id="auth-action" value="login">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Username</label>
                    <input type="text" id="username" required class="input-clean w-full px-4 py-2.5 rounded-lg text-white" placeholder="Username">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Password</label>
                    <input type="password" id="password" required class="input-clean w-full px-4 py-2.5 rounded-lg text-white" placeholder="••••••••">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Security PIN</label>
                    <input type="password" id="secret-pin" required class="input-clean w-full px-4 py-2.5 rounded-lg text-white" placeholder="PIN">
                </div>
            </div>
            <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg mt-8 transition-colors">
                Authorize
            </button>
        </form>

        <div class="mt-6">
            <button onclick="loginAsGuest()" class="w-full bg-zinc-800 hover:bg-zinc-700 text-gray-300 font-medium py-2.5 rounded-lg transition-colors">
                Guest Mode
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const warningModal = document.getElementById('warning-modal');
            const closeBtn = document.getElementById('close-warning-btn');
            const timerDisplay = document.getElementById('warn-timer');
            let timeLeft = 5;

            const countdown = setInterval(() => {
                timeLeft--;
                if(timerDisplay) timerDisplay.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    closeBtn.disabled = false;
                    closeBtn.innerText = "Understood";
                    closeBtn.classList.remove('bg-zinc-700', 'text-gray-400', 'cursor-not-allowed');
                    closeBtn.classList.add('bg-blue-600', 'text-white', 'hover:bg-blue-700');
                }
            }, 1000);

            closeBtn.addEventListener('click', () => {
                warningModal.style.opacity = '0';
                setTimeout(() => { warningModal.style.display = 'none'; }, 300);
            });
        });

        function showAlert(msg, isSuccess = false) {
            const box = document.getElementById('alert-box');
            box.className = `mb-6 p-3 rounded-lg text-sm text-center font-medium ${isSuccess ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}`;
            box.innerText = msg;
            box.classList.remove('hidden');
        }

        async function handleAuth(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const secretPin = document.getElementById('secret-pin').value;
            const btn = document.getElementById('submit-btn');

            btn.disabled = true; btn.innerText = 'Verifying...';

            try {
                const res = await fetch('/.netlify/functions/gateaway', {
                    method: 'POST', 
                    body: JSON.stringify({ action: 'login', username, password, secretPin })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('nova_user', JSON.stringify(data.user));
                    localStorage.setItem('nova_role', 'member');
                    showAlert('Access Granted. Redirecting...', true);
                    setTimeout(() => window.location.href = '/', 1000); 
                } else {
                    showAlert(data.message);
                }
            } catch (err) {
                showAlert('Portal unreachable.');
            } finally {
                btn.disabled = false; btn.innerText = 'Authorize';
            }
        }

        function loginAsGuest() {
            localStorage.setItem('nova_user', JSON.stringify({ username: 'Guest_' + Math.floor(Math.random() * 9999), wallet: 0 }));
            localStorage.setItem('nova_role', 'guest');
            window.location.href = '/'; 
        }
    </script>
</body>
</html>
