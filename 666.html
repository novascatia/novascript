<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | NovaScript Purchases</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #d4d4d8; }
        .stat-card { background: #18181b; border: 1px solid #27272a; }
        .buyer-badge { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-white mb-2">Purchase Logs</h1>
                <p class="text-gray-500 text-sm">Data transaksi diurutkan dari script yang paling populer.</p>
            </div>
            <a href="/admin" class="text-xs text-blue-400 hover:underline">← Admin Hub</a>
        </header>

        <div id="admin-stats" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div class="stat-card p-8 rounded-2xl">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Total Script Terjual</p>
                <h2 id="total-sold" class="text-5xl font-bold text-white">0</h2>
            </div>
            <div class="stat-card p-8 rounded-2xl">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Estimasi Omzet</p>
                <h2 id="total-bgl" class="text-5xl font-bold text-yellow-500">0 <span class="text-sm font-normal">BGL</span></h2>
            </div>
        </div>

        <div class="stat-card rounded-2xl overflow-hidden">
            <div class="p-6 border-b border-zinc-800 bg-zinc-900/30">
                <h3 class="font-bold text-white">Market Ranking</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-zinc-900/50 text-gray-400 uppercase text-[10px] font-bold">
                        <tr>
                            <th class="px-6 py-4">Script Name</th>
                            <th class="px-6 py-4 text-center">Price</th>
                            <th class="px-6 py-4 text-center">Sales</th>
                            <th class="px-6 py-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="stats-body">
                        <tr><td colspan="4" class="p-12 text-center text-gray-500 italic">Loading data dari get-purchases...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function fetchStats() {
            try {
                const user = JSON.parse(localStorage.getItem('nova_user') || '{}');
                
                // Mengambil data script untuk mendapatkan harga dan purchase_count global
                const resScripts = await fetch('/.netlify/functions/get-scripts');
                const scriptData = await resScripts.json();

                // Mengambil data pembelian dari get-purchases
                const resPurchases = await fetch(`/.netlify/functions/get-purchases?username=${user.username}`);
                const purchaseData = await resPurchases.json();

                if (scriptData.success) {
                    // URUTKAN: Berdasarkan purchase_count terbanyak
                    const sorted = scriptData.scripts.sort((a, b) => (b.purchase_count || 0) - (a.purchase_count || 0));
                    renderTable(sorted, purchaseData.owned_scripts || []);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderTable(scripts, ownedIds) {
            const body = document.getElementById('stats-body');
            let totalSold = 0;
            let totalBgl = 0;
            body.innerHTML = '';

            scripts.forEach((s, i) => {
                const count = parseInt(s.purchase_count) || 0;
                totalSold += count;
                totalBgl += (count * (parseInt(s.price) || 0));

                const row = document.createElement('tr');
                row.className = "border-t border-zinc-800 hover:bg-white/[0.02]";
                row.innerHTML = `
                    <td class="px-6 py-4 font-bold text-white">#${i+1} ${s.title}</td>
                    <td class="px-6 py-4 text-center text-zinc-400">${s.price} BGL</td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="toggleExpand(${s.id})" class="bg-zinc-800 px-3 py-1 rounded text-xs font-bold border border-zinc-700">
                            ${count} Buyers ▾
                        </button>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button class="text-[10px] text-red-500 font-bold uppercase hover:underline">Exclude</button>
                    </td>
                `;

                const expandRow = document.createElement('tr');
                expandRow.id = `expand-${s.id}`;
                expandRow.className = "hidden bg-black/40";
                
                // Karena get-purchases kamu hanya mengembalikan ID, kita tampilkan status kepemilikan admin dulu
                const isAdminOwner = ownedIds.includes(s.id) || ownedIds.includes(String(s.id));
                
                expandRow.innerHTML = `
                    <td colspan="4" class="px-10 py-6 border-l-2 border-blue-500 text-xs">
                        <p class="text-blue-400 font-bold mb-2 uppercase tracking-tighter">Buyer Details (Global Data Syncing...)</p>
                        <div class="flex gap-2">
                            <div class="buyer-badge px-3 py-1 rounded-full">${isAdminOwner ? '✅ Admin Purchased' : '❌ System Log Only'}</div>
                        </div>
                    </td>
                `;

                body.appendChild(row);
                body.appendChild(expandRow);
            });

            document.getElementById('total-sold').innerText = totalSold;
            document.getElementById('total-bgl').innerText = totalBgl.toLocaleString();
        }

        function toggleExpand(id) {
            const el = document.getElementById(`expand-${id}`);
            el.classList.toggle('hidden');
        }

        fetchStats();
    </script>
</body>
</html>
