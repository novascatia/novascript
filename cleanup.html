<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaAdmin | Ultra Mass Purge</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #ececec; font-family: 'Inter', sans-serif; }
        .glass-card { background: #0f0f11; border: 1px solid #1f1f22; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic">Nova <span class="text-red-600">Infinite Purge</span></h1>
                <p class="text-zinc-500 text-sm">Recursive Scan Aktif: Menembus limit database untuk ribuan akun bot.</p>
            </div>
            <div class="flex gap-4">
                <button onclick="fetchPreview()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-2xl font-bold text-sm transition-all shadow-xl shadow-blue-600/20">
                    SCAN DATABASE (TOTAL)
                </button>
            </div>
        </header>

        <div id="overview-section" class="hidden">
            <div class="glass-card rounded-3xl overflow-hidden border border-zinc-800 shadow-2xl">
                <div class="p-8 bg-zinc-900/30 border-b border-zinc-800 flex justify-between items-center">
                    <div>
                        <h2 class="text-white text-xl font-bold mb-1">Audit Keamanan Database</h2>
                        <p class="text-zinc-500 text-xs">Ditemukan <span id="detect-count" class="text-red-500 font-black text-sm">0</span> akun pola bot.</p>
                    </div>
                    <button onclick="confirmDeleteAll()" class="bg-red-600 hover:bg-red-500 text-white px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-red-600/30">
                        Wipe All Account
                    </button>
                </div>
                
                <div class="overflow-x-auto max-h-[70vh] overflow-y-auto custom-scrollbar">
                    <table class="w-full text-left text-xs">
                        <thead class="text-zinc-600 bg-black font-bold uppercase sticky top-0 z-20">
                            <tr>
                                <th class="py-5 px-10">Username</th>
                                <th class="py-5 px-10">Wallet</th>
                                <th class="py-5 px-10">IP Address</th>
                                <th class="py-5 px-10 text-right">Violation</th>
                            </tr>
                        </thead>
                        <tbody id="user-list" class="divide-y divide-zinc-800/50"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="empty-state" class="py-40 text-center">
            <p class="text-zinc-600 italic">Klik tombol di atas untuk menarik seluruh data dari database.</p>
        </div>
    </div>

    <script>
        async function fetchPreview() {
            const empty = document.getElementById('empty-state');
            const overview = document.getElementById('overview-section');
            empty.innerHTML = `<div class="flex flex-col items-center"><div class="animate-spin w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full mb-6"></div><p class="text-zinc-400 font-black uppercase text-xs tracking-widest">Bypassing Database Limits...</p></div>`;
            overview.classList.add('hidden');

            try {
                const res = await fetch('/.netlify/functions/cleanup-users', {
                    method: 'POST',
                    body: JSON.stringify({ action: 'preview' })
                });
                const data = await res.json();
                
                if(data.success && data.users.length > 0) {
                    renderUsers(data.users);
                    overview.classList.remove('hidden');
                    empty.classList.add('hidden');
                } else {
                    Swal.fire({ title: 'Clean!', text: 'Tidak ada bot ditemukan.', icon: 'success', background: '#0f0f11', color: '#fff' });
                    empty.innerHTML = `<p class="text-zinc-500 italic text-sm">Database bersih.</p>`;
                }
            } catch (err) {
                Swal.fire('Error', 'Server timeout atau database error.', 'error');
            }
        }

        function renderUsers(users) {
            const list = document.getElementById('user-list');
            document.getElementById('detect-count').innerText = users.length.toLocaleString();
            
            // Render Batching untuk performa
            const fragment = document.createDocumentFragment();
            users.forEach(u => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-white/[0.02] transition-colors";
                const isBot = /.*_\d+$/.test(u.username);
                
                tr.innerHTML = `
                    <td class="py-5 px-10 font-mono font-bold text-white tracking-tight">${u.username}</td>
                    <td class="py-5 px-10 text-zinc-400 font-mono">${u.wallet_balance} BGL</td>
                    <td class="py-5 px-10 text-zinc-600 font-mono text-[10px]">${u.last_ip || '---'}</td>
                    <td class="py-5 px-10 text-right">
                        <span class="px-3 py-1 rounded-lg border text-[9px] font-black tracking-widest ${isBot ? 'text-purple-400 border-purple-400/20 bg-purple-400/5' : 'text-red-500 border-red-500/20 bg-red-500/5'}">
                            ${isBot ? 'BOT PATTERN' : 'ILLEGAL DATA'}
                        </span>
                    </td>
                `;
                fragment.appendChild(tr);
            });
            list.innerHTML = '';
            list.appendChild(fragment);
        }

        async function confirmDeleteAll() {
            const count = document.getElementById('detect-count').innerText;
            const result = await Swal.fire({
                title: `Hapus ${count} Akun?`,
                text: "Tindakan ini permanen dan akan menghapus semua bot yang terdaftar.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                confirmButtonText: 'BERSIHKAN SEKARANG',
                background: '#0f0f11', color: '#fff'
            });

            if (result.isConfirmed) {
                Swal.fire({ title: 'Purging Database...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                const res = await fetch('/.netlify/functions/cleanup-users', {
                    method: 'POST',
                    body: JSON.stringify({ action: 'delete_all' })
                });
                const final = await res.json();
                if(final.success) {
                    Swal.fire({ title: 'Purged!', text: `${final.count} akun dihapus.`, icon: 'success', background: '#0f0f11', color: '#fff' }).then(() => location.reload());
                }
            }
        }
    </script>
</body>
</html>
