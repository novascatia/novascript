<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Cleanup v2 - NovaScript</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #ececec; font-family: 'Inter', sans-serif; }
        .user-card { background: #0f0f11; border: 1px solid #1f1f22; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tighter">System Cleanup</h1>
                <p class="text-zinc-500 text-sm">Penyaringan akun Bot Pattern (member_123) dan Breach Detection.</p>
            </div>
            <div class="flex gap-3">
                <button onclick="fetchPreview()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-xl font-bold text-sm transition-all shadow-[0_0_20px_rgba(37,99,235,0.2)]">
                    SCAN DATABASE
                </button>
            </div>
        </header>

        <div id="overview-section" class="hidden">
            <div class="user-card rounded-2xl overflow-hidden border border-zinc-800 shadow-2xl">
                <div class="p-6 bg-zinc-900/50 border-b border-zinc-800 flex justify-between items-center">
                    <span class="text-xs font-black uppercase tracking-widest text-red-500">Terdeteksi: <span id="detect-count">0</span> Akun</span>
                    <button onclick="confirmDeleteAll()" class="bg-red-600 hover:bg-red-500 text-white px-5 py-2 rounded-lg font-bold text-[10px] uppercase">Hapus Semua</button>
                </div>
                
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left text-xs">
                        <thead class="text-zinc-600 bg-black/20 uppercase font-bold">
                            <tr>
                                <th class="py-4 px-6">Username</th>
                                <th class="py-4 px-6">Balance</th>
                                <th class="py-4 px-6">IP Address</th>
                                <th class="py-4 px-6">Detection Label</th>
                            </tr>
                        </thead>
                        <tbody id="user-list" class="divide-y divide-zinc-800/50"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="empty-state" class="py-40 text-center">
            <p class="text-zinc-600 italic text-sm">Klik scan untuk memulai pembersihan sistem.</p>
        </div>
    </div>

    <script>
        async function fetchPreview() {
            const list = document.getElementById('user-list');
            document.getElementById('empty-state').innerHTML = "Scanning deep logs...";
            
            try {
                const res = await fetch('/.netlify/functions/cleanup-users', {
                    method: 'POST',
                    body: JSON.stringify({ action: 'preview' })
                });
                const data = await res.json();
                
                if(data.success && data.users.length > 0) {
                    renderUsers(data.users);
                    document.getElementById('overview-section').classList.remove('hidden');
                    document.getElementById('empty-state').classList.add('hidden');
                } else {
                    Swal.fire({ title: 'Aman', text: 'Tidak ada pola bot terdeteksi.', icon: 'success', background: '#0f0f11', color: '#fff' });
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderUsers(users) {
            const list = document.getElementById('user-list');
            document.getElementById('detect-count').innerText = users.length;
            
            list.innerHTML = users.map(u => {
                const username = u.username.toLowerCase();
                let reason = "Suspicious Account";
                let color = "text-red-400 bg-red-400/10 border-red-400/20";

                // Deteksi Manual di Client-Side (Double Check)
                if (username.startsWith('member_') || /.*_[0-9]+$/.test(username)) {
                    reason = "Bot Pattern (Member_ID)";
                    color = "text-purple-400 bg-purple-400/10 border-purple-400/20";
                } else if (u.wallet_balance == 999) {
                    reason = "Illegal Balance";
                    color = "text-yellow-500 bg-yellow-500/10 border-yellow-500/20";
                }

                return `
                    <tr class="hover:bg-white/[0.02]">
                        <td class="py-4 px-6 font-mono font-bold text-white">${u.username}</td>
                        <td class="py-4 px-6 text-zinc-400">${u.wallet_balance} BGL</td>
                        <td class="py-4 px-6 text-zinc-600 font-mono">${u.last_ip || '---'}</td>
                        <td class="py-4 px-6">
                            <span class="px-2 py-1 rounded border text-[9px] font-bold uppercase ${color}">
                                ${reason}
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function confirmDeleteAll() {
            const result = await Swal.fire({
                title: 'Hapus Akun Terdeteksi?',
                text: "Bot dan akun breach akan dihapus permanen.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                confirmButtonText: 'Ya, Bersihkan',
                background: '#0f0f11',
                color: '#fff'
            });

            if (result.isConfirmed) {
                const res = await fetch('/.netlify/functions/cleanup-users', {
                    method: 'POST',
                    body: JSON.stringify({ action: 'delete_all' })
                });
                const final = await res.json();
                if(final.success) {
                    Swal.fire({ title: 'Selesai', text: `${final.count} akun dihapus.`, icon: 'success', background: '#0f0f11', color: '#fff' }).then(() => location.reload());
                }
            }
        }
    </script>
</body>
</html>
