<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Cleanup - NovaScript</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #ececec; font-family: 'Inter', sans-serif; }
        .glass-card { background: #0f0f11; border: 1px solid #1f1f22; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tighter uppercase italic">Nova Cleanup</h1>
                <p class="text-zinc-500 text-sm">Targeting: Bot Patterns (name_ID), 999 balance, and breach keywords.</p>
            </div>
            <div class="flex gap-3">
                <button onclick="fetchPreview()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-2.5 rounded-xl font-bold text-sm transition-all shadow-lg">
                    SCAN DATABASE
                </button>
            </div>
        </header>

        <div id="overview-section" class="hidden">
            <div class="glass-card rounded-2xl overflow-hidden border border-zinc-800">
                <div class="p-6 bg-zinc-900/30 border-b border-zinc-800 flex justify-between items-center">
                    <h2 class="text-white font-bold">Terdeteksi: <span id="detect-count" class="text-red-500">0</span> Akun</h2>
                    <button onclick="confirmDeleteAll()" class="bg-red-600 hover:bg-red-500 text-white px-6 py-2 rounded-lg font-bold text-xs uppercase">Hapus Semua</button>
                </div>
                
                <div class="overflow-x-auto max-h-[60vh] overflow-y-auto">
                    <table class="w-full text-left text-xs">
                        <thead class="text-zinc-600 bg-black/40 font-bold uppercase">
                            <tr>
                                <th class="py-4 px-8">Username</th>
                                <th class="py-4 px-8">Balance</th>
                                <th class="py-4 px-8">Last IP</th>
                                <th class="py-4 px-8 text-right">Reason</th>
                            </tr>
                        </thead>
                        <tbody id="user-list" class="divide-y divide-zinc-800/50"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="empty-state" class="py-40 text-center text-zinc-600 italic">
            Klik scan untuk memulai pembersihan bot.
        </div>
    </div>

    <script>
        async function fetchPreview() {
            document.getElementById('empty-state').innerText = "Scanning deep logs...";
            try {
                const res = await fetch('/.netlify/functions/cleanup-users', {
                    method: 'POST',
                    body: JSON.stringify({ action: 'preview' })
                });
                const data = await res.json();
                
                if(data.success && data.users.length > 0) {
                    renderUsers(data.users);
                    document.getElementById('overview-section').classList.remove('hidden');
                    document.getElementById('empty-state').classList.add('hidden');
                } else {
                    Swal.fire({ title: 'Aman', text: 'Tidak ada pola bot terdeteksi.', icon: 'success', background: '#0f0f11', color: '#fff' });
                }
            } catch (err) { console.error(err); }
        }

        function renderUsers(users) {
            const list = document.getElementById('user-list');
            document.getElementById('detect-count').innerText = users.length;
            
            list.innerHTML = users.map(u => {
                const name = u.username.toLowerCase();
                let reason = "BREACH KEYWORD";
                let badge = "text-red-500 border-red-500/20 bg-red-500/5";

                if (/.*_\d+$/.test(name)) {
                    reason = "BOT PATTERN (NAME_ID)";
                    badge = "text-purple-400 border-purple-400/20 bg-purple-400/5";
                } else if (u.wallet_balance == 999) {
                    reason = "ILLEGAL BALANCE";
                    badge = "text-yellow-500 border-yellow-500/20 bg-yellow-500/5";
                }

                return `
                    <tr class="hover:bg-white/[0.02]">
                        <td class="py-4 px-8 font-mono font-bold text-white">${u.username}</td>
                        <td class="py-4 px-8 text-zinc-400">${u.wallet_balance} BGL</td>
                        <td class="py-4 px-8 text-zinc-600 font-mono">${u.last_ip || '---'}</td>
                        <td class="py-4 px-8 text-right">
                            <span class="px-2 py-1 rounded border text-[9px] font-bold ${badge}">${reason}</span>
                        </td>
                    </tr>`;
            }).join('');
        }

        async function confirmDeleteAll() {
            const result = await Swal.fire({
                title: 'Hapus Semua Terdeteksi?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                confirmButtonText: 'Ya, Bersihkan',
                background: '#0f0f11', color: '#fff'
            });

            if (result.isConfirmed) {
                const res = await fetch('/.netlify/functions/cleanup-users', {
                    method: 'POST',
                    body: JSON.stringify({ action: 'delete_all' })
                });
                const final = await res.json();
                if(final.success) {
                    Swal.fire({ title: 'Purged', text: `${final.count} akun dihapus.`, icon: 'success', background: '#0f0f11', color: '#fff' }).then(() => location.reload());
                }
            }
        }
    </script>
</body>
</html>
