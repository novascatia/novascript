<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waduh?!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pake font JetBrains Mono biar kerasa vibe developer tapi santai */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&family=Quicksand:wght@700&display=swap');
        
        body {
            background-color: #000000;
            overflow: hidden;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;

        .main-text {
            font-family: 'Quicksand', sans-serif;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .sub-text {
            font-family: 'JetBrains Mono', monospace;
            color: #3f3f46; /* zinc-600 */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="main-text text-4xl md:text-6xl px-6 mb-6 tracking-tight">
            There is no <span class="text-blue-500">/admin</span> here.
        </h1>
        
        <p class="sub-text text-lg md:text-2xl lowercase italic opacity-80">
            ...what are you doing, chief?
        </p>
    </div>

</body>
</html>
