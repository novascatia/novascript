<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaScript | Radiant Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ededed; }
        .nav-glass { background: rgba(9, 9, 11, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #27272a; }
        .card-item { background-color: #0f0f11; border: 1px solid #27272a; transition: all 0.2s ease-in-out; }
        .card-item:hover { border-color: #93c5fd; transform: translateY(-2px); background-color: #16161a; box-shadow: 0 10px 30px -10px rgba(147, 197, 253, 0.15); }
        
        .radiant-gradient-text {
            background: linear-gradient(to right, #bfdbfe, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-pastel {
            background-color: #050505;
            border: 1px solid #27272a;
            transition: all 0.2s;
        }
        .input-pastel:focus {
            border-color: #93c5fd;
            box-shadow: 0 0 0 2px rgba(147, 197, 253, 0.1);
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="radiant-login-modal" class="fixed inset-0 z-50 bg-black/95 backdrop-blur-xl flex items-center justify-center p-4">
        <div class="bg-[#0f0f11] border border-blue-900/30 w-full max-w-sm rounded-3xl p-10 shadow-[0_0_60px_rgba(147,197,253,0.1)] text-center">
            <div class="w-12 h-12 rounded-xl bg-blue-400/10 text-blue-300 flex items-center justify-center mx-auto mb-6 border border-blue-400/20 shadow-[0_0_20px_rgba(147,197,253,0.2)]">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-2xl font-black text-white tracking-tight mb-2 uppercase italic radiant-gradient-text">Radiant Access</h2>
            <p class="text-xs text-zinc-500 mb-8 leading-relaxed">Gunakan kredensial <span class="text-blue-300">RADIANTNAME</span> & <span class="text-blue-300">RADIANTPASS</span> untuk masuk.</p>
            
            <form id="radiant-form" onsubmit="loginRadiant(event)" class="space-y-4">
                <input type="text" id="rad-user" required placeholder="Radiant Username" class="input-pastel w-full px-5 py-3.5 rounded-xl text-sm text-white">
                <input type="password" id="rad-pass" required placeholder="Radiant Password" class="input-pastel w-full px-5 py-3.5 rounded-xl text-sm text-white">
                <button type="submit" id="btn-login" class="w-full bg-blue-400 hover:bg-blue-300 text-black font-extrabold py-4 rounded-xl transition-all shadow-lg shadow-blue-400/20 mt-4 uppercase tracking-widest text-xs">
                    Unlock Library
                </button>
            </form>
        </div>
    </div>

    <nav class="nav-glass fixed top-0 w-full z-40 px-6 py-4 flex justify-between items-center">
        <div class="font-bold text-white text-xl tracking-tighter flex items-center gap-2">
            <div class="w-7 h-7 rounded bg-blue-400 text-black flex items-center justify-center text-xs font-black shadow-[0_0_15px_rgba(147,197,253,0.4)]">R</div>
            <span>Radiant<span class="font-normal text-zinc-500">Hub</span></span>
        </div>
        <button onclick="window.location.href='/'" class="text-zinc-500 hover:text-white transition-colors text-xs font-bold uppercase tracking-widest">
            Main Library ➔
        </button>
    </nav>

    <main id="main-content" class="max-w-5xl mx-auto pt-32 pb-20 px-6 hidden">
        <header class="mb-16 text-center">
            <h1 class="text-4xl md:text-6xl font-black text-white mb-4 tracking-tighter uppercase italic">
                <span class="radiant-gradient-text">Radiant</span> Collection
            </h1>
            <p class="text-zinc-500 text-sm max-w-lg mx-auto leading-relaxed">Daftar script premium yang dikurasi khusus untuk member dengan tier Radiant.</p>
        </header>

        <div id="scripts-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        if(sessionStorage.getItem('isRadiant') === 'true') {
            document.getElementById('radiant-login-modal').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            loadScripts();
        }

        async function loginRadiant(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.innerText = 'VERIFYING...';
            
            const user = document.getElementById('rad-user').value;
            const pass = document.getElementById('rad-pass').value;

            try {
                const res = await fetch('/.netlify/functions/verify-radiant', {
                    method: 'POST', body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();

                if(data.success) {
                    sessionStorage.setItem('isRadiant', 'true');
                    document.getElementById('radiant-login-modal').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                    loadScripts();
                } else {
                    alert(data.message);
                }
            } catch(err) {
                alert("Server error.");
            } finally { btn.innerText = 'UNLOCK LIBRARY'; }
        }

        async function loadScripts() {
            const container = document.getElementById('scripts-container');
            const res = await fetch('/.netlify/functions/manage-radiant');
            const data = await res.json();
            
            container.innerHTML = '';
            if(data.scripts.length === 0) return container.innerHTML = '<p class="text-zinc-600 col-span-full text-center italic py-20">Belum ada script eksklusif yang tersedia.</p>';

            data.scripts.forEach(s => {
                container.innerHTML += `
                    <div class="card-item p-7 rounded-3xl flex flex-col relative overflow-hidden">
                        <div class="absolute -top-10 -right-10 w-24 h-24 bg-blue-400/5 blur-2xl rounded-full"></div>
                        <h3 class="font-bold text-white text-xl mb-3 tracking-tight">${s.title}</h3>
                        <p class="text-xs text-zinc-500 mb-8 flex-1 leading-relaxed">${s.description}</p>
                        <div class="space-y-3">
                            <span class="text-[10px] font-black text-blue-300/50 uppercase tracking-widest">Loader Script</span>
                            <div class="relative">
                                <textarea readonly class="w-full bg-black border border-zinc-800 text-blue-300 text-[10px] font-mono p-4 rounded-xl resize-none outline-none focus:border-blue-400/30 transition-colors" rows="3">${s.loader_script}</textarea>
                                <button onclick="copyCode(this)" class="absolute top-2 right-2 bg-zinc-900 border border-zinc-800 text-zinc-500 hover:text-white px-2 py-1 rounded-md text-[9px] font-bold uppercase transition-all">Copy</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function copyCode(btn) {
            const area = btn.previousElementSibling;
            area.select();
            document.execCommand('copy');
            const ori = btn.innerText;
            btn.innerText = 'DONE';
            btn.classList.add('text-blue-300', 'border-blue-300/20');
            setTimeout(() => { 
                btn.innerText = ori; 
                btn.classList.remove('text-blue-300', 'border-blue-300/20');
            }, 1500);
        }
    </script>
</body>
</html>
