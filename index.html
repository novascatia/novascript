<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | NovaScript</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ededed; overflow: hidden; }
        .maintenance-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 800;
            background: linear-gradient(180deg, #fff 0%, #3f3f46 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }
        .spotlight {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw; height: 80vh;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.07) 0%, transparent 70%);
            pointer-events: none; z-index: -1;
        }
        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%rect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 10;
        }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch {
            2%, 64% { transform: translate(2px, 0) skew(0deg); }
            4%, 60% { transform: translate(-2px, 0) skew(0deg); }
            62% { transform: translate(0, 0) skew(5deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative px-6 text-center">
    <div class="noise"></div>
    <div class="spotlight"></div>

    <div class="relative z-20 max-w-2xl">
        <div class="mb-6 inline-flex items-center justify-center px-3 py-1 rounded-full bg-red-500/10 border border-red-500/20 text-red-500 text-xs font-mono tracking-widest uppercase">
            Website is on maintenance right now :p
        </div>
        
        <h1 class="maintenance-text mb-6 glitch">UNDER MAINTENANCE</h1>
        
        <h2 class="text-xl md:text-2xl font-bold text-gray-300 mb-6 tracking-tight">
            Terimakasih orang baik yang sudah ngebreach website ini jadi gw bisa tau ada yang bisa ditembus, lov u
        </h2>
        
        <p class="text-sm md:text-base text-gray-500 max-w-md mx-auto mb-10 leading-relaxed">
            no data loss.
        </p>
      
</body>
</html>
